{% extends "base.html" %}

{% block content %}
<style>
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        margin: 0 auto;
    }
</style>

<div class="page-header">
    <h2>➕ Add New Faculty Member</h2>
</div>

<div class="form-card">
    <form method="POST">
        <div class="mb-4">
            <label for="name" class="form-label">👤 Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g., Dr. John Smith">
        </div>

        <div class="mb-4">
            <label for="department" class="form-label">🏢 Department</label>
            <input type="text" id="department" name="department" class="form-control" required placeholder="e.g., Computer Science">
        </div>

        <div class="mb-4">
            <label for="designation" class="form-label">📌 Designation</label>
            <input type="text" id="designation" name="designation" class="form-control" required placeholder="e.g., Associate Professor">
        </div>

        <div class="mb-4">
            <label for="email" class="form-label">📧 Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="e.g., john@ktu.edu">
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">🔐 Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter a secure password">
        </div>

        <div class="mb-4">
            <label for="role" class="form-label">🔑 Role</label>
            <select id="role" name="role" class="form-select">
                <option value="faculty">Faculty Member</option>
                <option value="admin">Administrator</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-lg">✅ Create Faculty</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
