{% extends "base.html" %}

{% block content %}
<style>
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        margin: 0 auto;
    }
</style>

<div class="page-header">
    <h2>➕ Add New Duty</h2>
</div>

<div class="form-card">
    <form method="POST">
        <div class="mb-4">
            <label for="dutyName" class="form-label">📋 Duty Name</label>
            <input type="text" id="dutyName" name="duty_name" class="form-control" required placeholder="e.g., Department Head, Exam Coordinator">
        </div>

        <div class="mb-4">
            <label for="category" class="form-label">🏷️ Category</label>
            <select id="category" name="category" class="form-select" required>
                <option value="">Select Category</option>
                <option value="Leadership">👔 Leadership (HOD, Placement Officer)</option>
                <option value="Exam">📝 Exam (Exam Cell, Invigilator)</option>
                <option value="Administrative">🔐 Administrative</option>
                <option value="Research">🔬 Research</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="durationType" class="form-label">⏰ Duration Type</label>
            <select id="durationType" name="duration_type" class="form-select" required onchange="updateDateLabels()">
                <option value="">Select Duration Type</option>
                <option value="Yearly">📅 Yearly (Full Academic Year)</option>
                <option value="Weekly">📆 Weekly (One Week Only)</option>
                <option value="Custom">⚙️ Custom (Specific Dates)</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="startDate" class="form-label">📅 Start Date</label>
            <input type="date" id="startDate" name="start_date" class="form-control" required>
            <small class="text-muted">When the duty begins</small>
        </div>

        <div class="mb-4">
            <label for="endDate" class="form-label">📅 End Date</label>
            <input type="date" id="endDate" name="end_date" class="form-control" required>
            <small class="text-muted">When the duty ends</small>
        </div>

        <div class="mb-4">
            <label for="hours" class="form-label">⏱️ Hours per Week</label>
            <input type="number" id="hours" name="hours" class="form-control" required min="1" placeholder="e.g., 5">
        </div>

        <div class="mb-4">
            <label for="academicYear" class="form-label">📅 Academic Year</label>
            <select id="academicYear" name="academic_year" class="form-select" required>
                <option value="">Select Year</option>
                <option value="2024-25">2024-25</option>
                <option value="2025-26">2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-lg">✅ Add Duty</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

<script>
    function updateDateLabels() {
        const durationType = document.getElementById('durationType').value;
        const startLabel = document.querySelector('label[for="startDate"]');
        const endLabel = document.querySelector('label[for="endDate"]');
        
        if (durationType === 'Yearly') {
            startLabel.textContent = '📅 Academic Year Start Date';
            document.querySelector('small:nth-of-type(1)').textContent = 'Typically July/August';
        } else if (durationType === 'Weekly') {
            startLabel.textContent = '📅 Week Start Date (Monday)';
            document.querySelector('small:nth-of-type(1)').textContent = 'Monday of the exam week';
        } else {
            startLabel.textContent = '📅 Start Date';
            document.querySelector('small:nth-of-type(1)').textContent = 'Flexible start date';
        }
    }
    
    // Auto-set end date when duration type changes
    document.getElementById('durationType').addEventListener('change', function() {
        const startDate = document.getElementById('startDate').value;
        const durationType = this.value;
        
        if (!startDate) return;
        
        const start = new Date(startDate);
        let end = new Date(start);
        
        if (durationType === 'Weekly') {
            end.setDate(end.getDate() + 6); // One week
        } else if (durationType === 'Yearly') {
            end.setFullYear(end.getFullYear() + 1);
            end.setDate(end.getDate() - 1); // Day before next year
        }
        
        document.getElementById('endDate').value = end.toISOString().split('T')[0];
        updateDateLabels();
    });
</script>
