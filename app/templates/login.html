{% extends "base.html" %}

{% block content %}
<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }
    
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .login-container {
        width: 100%;
        max-width: 450px;
    }
    
    .login-card {
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        background: white;
    }
    
    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 40px 20px;
        text-align: center;
    }
    
    .login-header h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 10px;
    }
    
    .login-header p {
        margin: 0;
        font-size: 0.95rem;
        opacity: 0.9;
    }
    
    .login-body {
        padding: 40px;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 0.95rem;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
        box-sizing: border-box;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .login-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        margin-top: 10px;
    }
    
    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:active {
        transform: translateY(0);
    }
    
    .demo-credentials {
        margin-top: 30px;
        padding-top: 25px;
        border-top: 2px solid #f0f0f0;
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        font-size: 0.9rem;
    }
    
    .demo-credentials h6 {
        margin-top: 0;
        color: #667eea;
        font-weight: bold;
    }
    
    .demo-credentials p {
        margin: 8px 0;
        color: #555;
    }
    
    .demo-credentials code {
        background: #eee;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        color: #764ba2;
    }
</style>

<div class="container">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🎓 Faculty Workload</h1>
                <p>Smart Faculty Workload Management System - KTU</p>
            </div>

            <div class="login-body">
                <form method="POST">
                    <div class="form-group">
                        <label for="email">📧 Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-control" 
                            required 
                            placeholder="Enter your email"
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">🔐 Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-control" 
                            required 
                            placeholder="Enter your password"
                        >
                    </div>

                    <button type="submit" class="login-btn">
                        ✨ Sign In
                    </button>
                </form>

                <div class="demo-credentials">
                    <h6>📝 Demo Credentials</h6>
                    <p><strong>Email:</strong> <code>admin@ktu.edu</code></p>
                    <p><strong>Password:</strong> <code>password123</code></p>
                    <p style="margin-top: 10px; color: #999; font-size: 0.85rem;">
                        💡 Use these credentials to test the admin features
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
