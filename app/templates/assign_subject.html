{% extends "base.html" %}

{% block content %}
<style>
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        margin: 0 auto;
    }
</style>

<div class="page-header">
    <h2>🔗 Assign Subject to Faculty</h2>
</div>

<div class="form-card">
    <form method="POST">
        <div class="mb-4">
            <label for="facultyId" class="form-label">👤 Select Faculty Member</label>
            <select class="form-select" id="facultyId" name="faculty_id" required>
                <option value="">Choose a faculty member...</option>
                {% for faculty in faculties %}
                    <option value="{{ faculty.id }}">{{ faculty.name }} ({{ faculty.department }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="subjectId" class="form-label">📚 Select Subject</label>
            <select class="form-select" id="subjectId" name="subject_id" required>
                <option value="">Choose a subject...</option>
                {% for subject in subjects %}
                    <option value="{{ subject.id }}">
                        {{ subject.course_code }} - {{ subject.subject_name }} (Sem: {{ subject.semester }}, {{ subject.hours_per_week }} hrs/week)
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="classId" class="form-label">🏫 Select Class</label>
            <select class="form-select" id="classId" name="class_id" required>
                <option value="">Choose a class...</option>
                {% for class_obj in classes %}
                    <option value="{{ class_obj.id }}">
                        {{ class_obj.class_name }} ({{ class_obj.department }}, Sem {{ class_obj.semester }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="academicYear" class="form-label">📅 Academic Year</label>
            <select class="form-select" id="academicYear" name="academic_year" required>
                <option value="">Select Year</option>
                <option value="2024-25">2024-25</option>
                <option value="2025-26">2025-26</option>
                <option value="2026-27">2026-27</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning btn-lg">✅ Assign Subject</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
